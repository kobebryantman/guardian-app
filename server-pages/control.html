<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardian 管控中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--accent:#4f8ef7;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--muted:#64748b;font-family:'Segoe UI',system-ui,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}

/* 登录 */
#loginScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:9999}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:380px;text-align:center}
.login-box h1{font-size:24px;margin-bottom:8px;color:#fff}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:32px}
.login-box input{display:block;width:100%;padding:12px 16px;background:#0f1117;border:1px solid var(--border);border-radius:8px;color:#fff;font-size:14px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600;transition:.2s}
.login-box button:hover{background:#3b7de8}
.login-box .error{color:var(--red);font-size:13px;margin-top:12px;display:none}

/* 主界面 */
#mainApp{display:none;height:100vh;overflow:hidden}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:56px;gap:16px}
.header h2{font-size:16px;font-weight:600;color:#fff;flex:1}
.header .online-count{background:var(--accent);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.header button{background:#0f1117;border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px}
.header button:hover{border-color:var(--accent)}

.main-layout{display:flex;height:calc(100vh - 56px)}

/* 左侧工具栏 */
.sidebar{width:200px;background:var(--card);border-right:1px solid var(--border);padding:12px;display:flex;flex-direction:column;gap:4px}
.nav-btn{padding:10px 14px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;text-align:left;transition:.2s}
.nav-btn:hover{background:#0f1117;color:var(--text)}
.nav-btn.active{background:var(--accent);color:#fff}

/* 内容区 */
.content{flex:1;overflow-y:auto;padding:20px}
.section-title{font-size:15px;font-weight:600;margin-bottom:16px;color:#fff;display:flex;align-items:center;gap:8px}
.section-title span{font-size:12px;color:var(--muted);font-weight:400}

/* 卡片网格 */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:24px}

/* 子机卡片 */
.client-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;transition:.2s}
.client-card:hover{border-color:var(--accent)}
.client-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.client-card .name{font-size:15px;font-weight:600;color:#fff}
.client-card .seat{font-size:12px;color:var(--muted)}
.client-card .ip{font-size:12px;color:var(--muted);font-family:monospace}
.client-card .status-row{display:flex;gap:6px;margin:8px 0}
.badge{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge.online{background:#22c55e22;color:var(--green)}
.badge.offline{background:#64748b22;color:var(--muted)}
.badge.guarding{background:#4f8ef722;color:var(--accent)}
.badge.idle{background:#64748b22;color:var(--muted)}
.client-card .violations{font-size:12px;color:var(--red);margin-top:6px}
.client-card .actions{display:flex;gap:6px;margin-top:10px}
.client-card .actions button{flex:1;padding:6px;font-size:12px;border-radius:5px;border:none;cursor:pointer;font-weight:600}
.btn-on{background:#22c55e22;color:var(--green)}
.btn-off{background:#ef444422;color:var(--red)}
.btn-kill{background:#f59e0b22;color:var(--yellow)}

/* 学生管理 */
.student-list{margin-top:8px}
.student-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.student-row .info{flex:1}
.student-row .name{font-weight:600;font-size:14px}
.student-row .meta{font-size:12px;color:var(--muted)}
.student-row .code{font-family:monospace;font-size:13px;background:#0f1117;padding:4px 10px;border-radius:4px;color:var(--accent);letter-spacing:2px}
.student-row .del-btn{background:transparent;border:1px solid var(--border);color:var(--red);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px}
.student-row .del-btn:hover{background:var(--red);color:#fff;border-color:var(--red)}

.add-student{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.add-student input{width:calc(33.33% - 8px);padding:8px 12px;background:#0f1117;border:1px solid var(--border);border-radius:6px;color:#fff;font-size:13px;outline:none}
.add-student input:focus{border-color:var(--accent)}
.add-student button{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;margin-top:10px;font-weight:600}

/* 统计 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;color:#fff}
.stat-card .label{font-size:12px;color:var(--muted);margin-top:4px}
.stat-card.green .num{color:var(--green)}
.stat-card.red .num{color:var(--red)}

/* 白名单 */
.whitelist-editor textarea{width:100%;height:300px;background:#0f1117;border:1px solid var(--border);border-radius:8px;color:var(--accent);font-family:monospace;font-size:13px;padding:12px;resize:vertical;outline:none}
.whitelist-editor button{margin-top:10px;padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px}

/* 全局广播 */
.broadcast textarea{width:100%;height:120px;background:#0f1117;border:1px solid var(--border);border-radius:8px;color:#fff;font-size:14px;padding:12px;resize:vertical;outline:none}
.broadcast button{margin-top:10px;padding:10px 24px;background:var(--red);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.broadcast .hint{font-size:12px;color:var(--muted);margin-top:6px}

/* 无数据 */
.empty{text-align:center;padding:60px;color:var(--muted);font-size:14px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:8px;font-size:13px;z-index:10000;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- 登录界面 -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🛡️ Guardian 管控中心</h1>
    <p>教师端 · 守护每一台子机</p>
    <input type="text" id="username" placeholder="用户名" value="admin">
    <input type="password" id="password" placeholder="密码" value="guardian2026">
    <button onclick="doLogin()">进入管控中心</button>
    <div class="error" id="loginError">用户名或密码错误</div>
  </div>
</div>

<!-- 主界面 -->
<div id="mainApp">
  <div class="header">
    <h2>🛡️ Guardian 管控中心</h2>
    <span class="online-count" id="onlineCount">在线 0 台</span>
    <button onclick="logout()">退出登录</button>
  </div>

  <div class="main-layout">
    <!-- 侧边栏 -->
    <div class="sidebar">
      <button class="nav-btn active" onclick="showTab('dashboard')" id="nav-dashboard">📊 班级看板</button>
      <button class="nav-btn" onclick="showTab('students')" id="nav-students">👥 学生管理</button>
      <button class="nav-btn" onclick="showTab('whitelist')" id="nav-whitelist">⚙️ 白名单配置</button>
      <button class="nav-btn" onclick="showTab('broadcast')" id="nav-broadcast">📢 全局广播</button>
      <div style="flex:1"></div>
      <button class="nav-btn" onclick="showTab('logs')" id="nav-logs">📋 违规日志</button>
    </div>

    <!-- 内容 -->
    <div class="content" id="content">

      <!-- 班级看板 -->
      <div id="tab-dashboard">
        <div class="stats" id="stats"></div>
        <div class="section-title">子机状态 <span id="clientTime"></span></div>
        <div class="card-grid" id="clientGrid">
          <div class="empty">暂无子机接入，请确保子机已连接到管控服务器</div>
        </div>
      </div>

      <!-- 学生管理 -->
      <div id="tab-students" style="display:none">
        <div class="section-title">添加学生</div>
        <div class="add-student">
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <input id="sName" placeholder="学生姓名 *">
            <input id="sClass" placeholder="班级，如 计科241">
            <input id="sSeat" placeholder="座位号，如 A1">
          </div>
          <button onclick="addStudent()">+ 添加学生</button>
        </div>
        <div class="section-title">学生列表（已注册 <span id="studentCount">0</span> 人）</div>
        <div class="student-list" id="studentList"></div>
      </div>

      <!-- 白名单配置 -->
      <div id="tab-whitelist" style="display:none">
        <div class="section-title">全局白名单配置 <span>— 保存后一键下发到所有子机</span></div>
        <div class="whitelist-editor">
          <textarea id="wlEditor" placeholder='// 允许的进程（完整文件名）
chrome.exe
firefox.exe
msedge.exe
qq.exe
wechat.exe

// 允许的浏览器
chrome.exe
firefox.exe
msedge.exe

// 允许访问的域名
baidu.com
csdn.net
github.com'></textarea>
          <button onclick="saveWhitelist()">💾 保存并下发到所有子机</button>
        </div>
      </div>

      <!-- 全局广播 -->
      <div id="tab-broadcast" style="display:none">
        <div class="section-title">全局广播消息</div>
        <div class="broadcast">
          <textarea id="broadcastMsg" placeholder="输入要广播给所有子机的消息，例如：
同学们请注意，现在开始进行课堂小测，请切换到答题界面。
"></textarea>
          <button onclick="doBroadcast()">📢 发送给所有子机</button>
          <div class="hint">⚠️ 广播消息会显示在所有子机的 Guardian 弹窗中</div>
        </div>
      </div>

      <!-- 违规日志 -->
      <div id="tab-logs" style="display:none">
        <div class="section-title">全校违规记录</div>
        <div id="logList" style="display:flex;flex-direction:column;gap:8px"></div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:3847';
let token = localStorage.getItem('guardian_token') || '';
let username = localStorage.getItem('guardian_user') || '';
let clients = [];
let students = [];
let pollTimer = null;

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'x-token': token, 'Content-Type': 'application/json', ...(opts.headers || {}) }
  });
  return res.json();
}

async function doLogin() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  const r = await fetch(API + '/api/admin/login', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: u, password: p })
  });
  const d = await r.json();
  if (!d.ok) { document.getElementById('loginError').style.display = 'block'; return; }
  token = d.token; username = d.username;
  localStorage.setItem('guardian_token', token);
  localStorage.setItem('guardian_user', username);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  startPolling();
}

function logout() {
  token = ''; username = '';
  localStorage.removeItem('guardian_token');
  localStorage.removeItem('guardian_user');
  clearInterval(pollTimer);
  location.reload();
}

function showTab(name) {
  ['dashboard','students','whitelist','broadcast','logs'].forEach(t => {
    document.getElementById('tab-' + t).style.display = 'none';
    document.getElementById('nav-' + t).classList.remove('active');
  });
  document.getElementById('tab-' + name).style.display = 'block';
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'students') loadStudents();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function startPolling() {
  await loadClients();
  await loadStudents();
  pollTimer = setInterval(async () => { await loadClients(); }, 3000);
}

async function loadClients() {
  const d = await api('/api/clients');
  if (!d.ok) return;
  clients = d.clients;
  renderStats();
  renderClients();
}

async function loadStudents() {
  const d = await api('/api/students');
  if (!d.ok) return;
  students = d.students;
  document.getElementById('studentCount').textContent = students.length;
  renderStudents();
}

function renderStats() {
  const online = clients.filter(c => c.online).length;
  const guarding = clients.filter(c => c.guardActive && c.online).length;
  const violations = clients.reduce((a, c) => a + (c.violations ? c.violations.length : 0), 0);
  const offline = students.length - online;
  document.getElementById('onlineCount').textContent = `在线 ${online} / ${students.length} 台`;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card green"><div class="num">${online}</div><div class="label">在线子机</div></div>
    <div class="stat-card"><div class="num" style="color:var(--accent)">${guarding}</div><div class="label">守卫运行中</div></div>
    <div class="stat-card red"><div class="num">${violations}</div><div class="label">总违规记录</div></div>
    <div class="stat-card"><div class="num" style="color:var(--muted)">${Math.max(0, offline)}</div><div class="label">离线</div></div>
  `;
  document.getElementById('clientTime').textContent = new Date().toLocaleTimeString();
}

function renderClients() {
  const grid = document.getElementById('clientGrid');
  if (clients.length === 0) {
    grid.innerHTML = '<div class="empty">暂无子机接入。请在子机上运行 Guardian，选择"子机模式"并连接本服务器。</div>';
    return;
  }
  grid.innerHTML = clients.map(c => {
    const vCount = c.violations ? c.violations.length : 0;
    const vText = vCount > 0 ? `<div class="violations">⚠️ ${vCount} 条违规记录</div>` : '';
    return `
    <div class="client-card">
      <div class="top">
        <div>
          <div class="name">${c.studentName || '未绑定学生'}</div>
          <div class="seat">${c.className || ''} ${c.seatNumber || ''}</div>
        </div>
        <div>
          <span class="badge ${c.online ? 'online' : 'offline'}">${c.online ? '🟢 在线' : '🔴 离线'}</span>
          <span class="badge ${c.guardActive ? 'guarding' : 'idle'}">${c.guardActive ? '🛡️ 守卫' : '⏸ 暂停'}</span>
        </div>
      </div>
      <div class="ip">${c.ip} · ${c.hostname}</div>
      ${vText}
      <div class="actions">
        <button class="${c.guardActive ? 'btn-off' : 'btn-on'}" onclick="toggleGuard('${c.clientId}', ${!c.guardActive})">
          ${c.guardActive ? '⏸ 暂停守卫' : '▶ 启动守卫'}
        </button>
      </div>
    </div>`;
  }).join('');

  // 渲染违规日志
  renderLogs();
}

function renderLogs() {
  const logList = document.getElementById('logList');
  const allLogs = [];
  clients.forEach(c => {
    if (c.violations) {
      c.violations.forEach(v => {
        allLogs.push({ ...v, studentName: c.studentName, ip: c.ip });
      });
    }
  });
  allLogs.sort((a, b) => new Date(b.time || 0) - new Date(a.time || 0));
  if (allLogs.length === 0) {
    logList.innerHTML = '<div class="empty">暂无违规记录</div>';
    return;
  }
  logList.innerHTML = allLogs.slice(0, 50).map(v => `
    <div class="student-row">
      <div class="info">
        <div class="name" style="color:var(--red)">⚠️ ${v.name}</div>
        <div class="meta">${v.studentName || v.ip} · ${v.time || ''} · ${v.title ? v.title.slice(0, 40) : ''}</div>
      </div>
    </div>`).join('');
}

async function toggleGuard(clientId, enabled) {
  await api(`/api/clients/${clientId}/toggle-guard`, {
    method: 'POST', body: JSON.stringify({ enabled })
  });
  toast(enabled ? '已启动守卫' : '已暂停守卫');
  await loadClients();
}

async function addStudent() {
  const name = document.getElementById('sName').value.trim();
  const cls = document.getElementById('sClass').value.trim();
  const seat = document.getElementById('sSeat').value.trim();
  if (!name) { toast('请输入学生姓名'); return; }
  const d = await api('/api/students', { method: 'POST', body: JSON.stringify({ studentName: name, className: cls, seatNumber: seat }) });
  if (d.ok) {
    toast(`已添加 ${name}，接入码：${d.student.joinCode}`);
    document.getElementById('sName').value = '';
    document.getElementById('sClass').value = '';
    document.getElementById('sSeat').value = '';
    await loadStudents();
  }
}

async function deleteStudent(id) {
  if (!confirm('确定删除该学生？')) return;
  await api(`/api/students/${id}`, { method: 'DELETE' });
  await loadStudents();
}

function renderStudents() {
  const el = document.getElementById('studentList');
  if (students.length === 0) {
    el.innerHTML = '<div class="empty">暂无学生，请先添加</div>';
    return;
  }
  el.innerHTML = students.map(s => {
    const client = clients.find(c => c.studentId === s.id);
    const status = client && client.online ? '🟢 在线' : '🔴 离线';
    return `<div class="student-row">
      <div class="info">
        <div class="name">${s.studentName}</div>
        <div class="meta">${s.className} ${s.seatNumber} · ${status}</div>
      </div>
      <div class="code">${s.joinCode}</div>
      <button class="del-btn" onclick="deleteStudent('${s.id}')">删除</button>
    </div>`;
  }).join('');
}

async function saveWhitelist() {
  const raw = document.getElementById('wlEditor').value;
  // 简单解析：进程以 .exe 结尾；browsers 同理；urls 以域名格式
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('//'));
  const processes = [], browsers = [], urls = [];
  const browserSet = new Set(['chrome.exe','firefox.exe','msedge.exe','opera.exe','360se.exe','qqbrowser.exe']);
  lines.forEach(l => {
    if (l.includes('.') && !l.includes(' ') && (l.includes('.com') || l.includes('.cn') || l.includes('.net') || l.includes('.org'))) {
      urls.push(l);
    } else if (browserSet.has(l.toLowerCase())) {
      browsers.push(l);
    } else {
      processes.push(l);
    }
  });
  const whitelist = { processes, browsers, urls };
  // 广播给所有子机
  const d = await api('/api/broadcast', { method: 'POST', body: JSON.stringify({ whitelist }) });
  toast(d.ok ? `已保存并下发到 ${d.sent} 台子机` : '保存失败');
}

async function doBroadcast() {
  const msg = document.getElementById('broadcastMsg').value.trim();
  if (!msg) { toast('消息内容不能为空'); return; }
  const d = await api('/api/broadcast', { method: 'POST', body: JSON.stringify({ message: msg }) });
  if (d.ok) {
    toast(`已发送给 ${d.sent} 台子机`);
    document.getElementById('broadcastMsg').value = '';
  }
}

// 页面加载时检查登录状态
if (token) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  startPolling();
}
</script>
</body>
</html>
